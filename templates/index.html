<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Realism AI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:black;
font-family:Arial;
color:white;
}

/* CANVAS */
canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

/* GLASS PANEL */
.panel{
position:absolute;
z-index:10;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:850px;
padding:60px;
border-radius:40px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(60px);
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 60px 150px rgba(0,0,0,0.9);

text-align:center;
animation:fade 1.5s ease;
}

@keyframes fade{
from{opacity:0;transform:translate(-50%,-45%)}
to{opacity:1;transform:translate(-50%,-50%)}
}

h1{
font-size:3rem;
background:linear-gradient(90deg,#00f5ff,#9d4edd,#ff00c8);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:30px;
}

textarea{
width:100%;
height:150px;
border-radius:25px;
padding:20px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
color:white;
font-size:16px;
resize:none;
outline:none;
transition:0.3s;
}

textarea:focus{
border-color:#9d4edd;
box-shadow:0 0 40px rgba(157,78,221,0.8);
}

button{
margin-top:25px;
width:100%;
padding:16px;
border:none;
border-radius:18px;
font-size:17px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(135deg,#00f5ff,#9d4edd);
color:white;
transition:0.3s;
}

button:hover{
transform:translateY(-5px);
box-shadow:0 25px 70px rgba(0,245,255,0.6);
}

img{
margin-top:25px;
width:100%;
border-radius:25px;
display:none;
box-shadow:0 40px 120px black;
}

</style>
</head>
<body>

<script>

/* ========================= */
/* SCENE SETUP */
/* ========================= */

let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z = 6;

let renderer = new THREE.WebGLRenderer({
antialias:true,
alpha:true
});

renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

/* ========================= */
/* ULTRA REALISTIC LIQUID PLANE */
/* ========================= */

let geometry = new THREE.PlaneGeometry(25,25,200,200);

let material = new THREE.ShaderMaterial({

uniforms:{
u_time:{value:0},
u_mouse:{value:new THREE.Vector2(0,0)}
},

vertexShader:`
uniform float u_time;
uniform vec2 u_mouse;
varying vec2 vUv;

void main(){

vUv = uv;

vec3 pos = position;

float dist = distance(uv,u_mouse);

pos.z += sin(dist*25.0 - u_time*4.0)*0.8;
pos.x += cos(uv.y*10.0 + u_time)*0.2;
pos.y += sin(uv.x*10.0 + u_time)*0.2;

gl_Position = projectionMatrix * modelViewMatrix * vec4(pos,1.0);
}
`,

fragmentShader:`
varying vec2 vUv;

void main(){

vec3 deepBlue = vec3(0.02,0.02,0.08);
vec3 neon = vec3(0.0,1.0,0.9);

float glow = smoothstep(0.2,0.8,vUv.x);

vec3 color = mix(deepBlue,neon,glow);

gl_FragColor = vec4(color,0.95);
}
`,

transparent:true

});

let plane = new THREE.Mesh(geometry,material);
scene.add(plane);

/* ========================= */
/* PARTICULES REALISTES */
/* ========================= */

let particleGeo = new THREE.BufferGeometry();
let count = 1200;

let positions = new Float32Array(count*3);

for(let i=0;i<count;i++){
positions[i*3] = (Math.random()-0.5)*30;
positions[i*3+1] = (Math.random()-0.5)*30;
positions[i*3+2] = (Math.random()-0.5)*30;
}

particleGeo.setAttribute("position",new THREE.BufferAttribute(positions,3));

let particleMat = new THREE.PointsMaterial({
color:"#ffffff",
size:0.08,
transparent:true,
opacity:0.6
});

let particles = new THREE.Points(particleGeo,particleMat);
scene.add(particles);

/* ========================= */
/* ANIMATION LOOP */
/* ========================= */

function animate(){
requestAnimationFrame(animate);

material.uniforms.u_time.value +=0.02;

plane.rotation.x = Math.sin(Date.now()*0.0003)*0.1;
plane.rotation.y = Math.cos(Date.now()*0.0002)*0.1;

particles.rotation.y +=0.001;

renderer.render(scene,camera);
}

animate();

/* ========================= */
/* MOUSE INTERACTION */
/* ========================= */

window.addEventListener("mousemove",(e)=>{
let x = (e.clientX/window.innerWidth)*2-1;
let y = -(e.clientY/window.innerHeight)*2+1;

material.uniforms.u_mouse.value.x = (x+1)/2;
material.uniforms.u_mouse.value.y = (y+1)/2;
});

/* CLICK WAVE */

window.addEventListener("click",()=>{
material.uniforms.u_time.value +=3;
});

/* RESIZE */

window.addEventListener("resize",()=>{
renderer.setSize(window.innerWidth,window.innerHeight);
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
});

</script>

<div class="panel">
<h1>ULTRA REALISM AI</h1>

<textarea placeholder="Décris ton image ultra réaliste..."></textarea>

<button>Générer Image</button>

<img id="result"/>
</div>

</body>
</html>
